<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <h1>To-Do List</h1>
    <p class="subtitle">Organizeaza-ti sarcinile zilnice</p>
  </header>

  <main>
    <div class="input-section">
      <h2>Sarcina noua</h2>
      <input type="text" id="todoInput" placeholder="Descrie sarcina...">
      <select id="prioritySelect">
        <option value="low">Prioritate scazuta</option>
        <option value="medium" selected>Prioritate medie</option>
        <option value="high">Prioritate inalta</option>
      </select>
      <button onclick="addTodo()">Adauga</button>
    </div>

    <div class="filter-section">
      <button onclick="filterTodos('all')">Toate</button>
      <button onclick="filterTodos('active')">Active</button>
      <button onclick="filterTodos('done')">Finalizate</button>
    </div>

    <div class="list-section">
      <h2>Lista sarcinilor</h2>
      <ul id="todoList"></ul>
    </div>
  </main>

  <script src="todoStore.js"></script>
  <script src="app.js"></script>
</body>
</html>
